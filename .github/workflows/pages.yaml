# Bygger landingssiden (Astro) + Storybook til ett GitHub Pages-artefakt.
#   landing  -> https://navikt.github.io/nda/
#   storybook -> https://navikt.github.io/nda/storybook/
#
# Helt adskilt fra deploy.yaml (som ruller appen til Nais).
# Krever at GitHub Pages er satt til "GitHub Actions" som kilde (Settings -> Pages).
name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.storybook/**'
      - 'app/**/*.stories.*'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Tillat én samtidig deploy; ikke avbryt en pågående produksjons-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # ratchet:actions/configure-pages@v6.0.0

      # --- Landingsside (Astro) ---
      - name: Install landing deps
        working-directory: landing
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Type-check landing
        working-directory: landing
        run: pnpm check

      - name: Build landing
        working-directory: landing
        run: pnpm build

      # --- Storybook (rot-prosjektet), bygget inn under /storybook ---
      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook -o landing/dist/storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # ratchet:actions/upload-pages-artifact@v5.0.0
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # ratchet:actions/deploy-pages@v4
