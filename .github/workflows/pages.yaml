# Bygger landingssiden (Astro) + Storybook til ett GitHub Pages-artefakt.
#   landing  -> https://navikt.github.io/nda/
#   storybook -> https://navikt.github.io/nda/storybook/
#
# Helt adskilt fra deploy.yaml (som ruller appen til Nais).
# Krever at GitHub Pages er satt til "GitHub Actions" som kilde (Settings -> Pages).
name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.storybook/**'
      - 'app/**/*.stories.*'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Tillat én samtidig deploy; ikke avbryt en pågående produksjons-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # ratchet:pnpm/action-setup@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # ratchet:actions/configure-pages@v5

      # --- Landingsside (Astro) ---
      - name: Install landing deps
        working-directory: landing
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Type-check landing
        working-directory: landing
        run: pnpm check

      - name: Build landing
        working-directory: landing
        run: pnpm build

      # --- Storybook (rot-prosjektet), bygget inn under /storybook ---
      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook -o landing/dist/storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # ratchet:actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # ratchet:actions/deploy-pages@v4
